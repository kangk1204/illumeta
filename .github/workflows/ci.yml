name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        # pytest collects BOTH unittest.TestCase classes AND pytest-native suites
        # (module-level def test_* using tmp_path/parametrize). `unittest discover`
        # errors on `import pytest` and silently skips the pytest-native tests, so
        # the robustness/smoke suites never ran under the old command.
        run: python -m pytest tests

  r-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
      - name: Check R script syntax
        run: |
          errors=0
          for f in r_scripts/*.R; do
            if ! Rscript -e "tryCatch(parse(file='$f'), error=function(e) { cat('PARSE ERROR:', conditionMessage(e), '\n'); quit(status=1) })"; then
              echo "::error file=$f::R parse error in $f"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors R script(s) have syntax errors"
            exit 1
          fi
          echo "All R scripts parsed successfully"

  r-doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Put pre-installed Miniconda on PATH
        # GitHub-hosted runners ship Miniconda at $CONDA but do not add it to PATH.
        # install_full.sh needs `conda` discoverable or it exits early.
        run: echo "$CONDA/bin" >> "$GITHUB_PATH"
      - name: Install R + Bioconductor via install_full.sh
        run: ./scripts/install_full.sh --minimal --skip-doctor
      - name: Run illumeta doctor
        run: |
          eval "$(conda shell.bash hook 2>/dev/null)"
          conda activate illumeta
          python3 illumeta.py doctor --skip-pandoc
